# Fly.io — free allowance: https://fly.io/docs/about/pricing/
app = "store-intelligence"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/app/deploy/data"
  CORS_ORIGINS = "*"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
